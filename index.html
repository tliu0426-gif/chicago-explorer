<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicago Neighborhood Explorer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#F8FAFC;color:#1E293B;min-height:100vh}

/* ── Top bar ── */
.topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:#fff;border-bottom:1px solid #E2E8F0;position:sticky;top:0;z-index:1000;flex-wrap:wrap}
.logo{font-size:16px;font-weight:600;color:#1E293B;white-space:nowrap}
.logo span{color:#0D9488}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94A3B8;font-size:16px}
.search{width:100%;padding:8px 12px 8px 34px;border:1px solid #E2E8F0;border-radius:8px;font-size:13px;background:#F8FAFC;outline:none}
.search:focus{border-color:#0D9488;background:#fff}
.role-tabs,.view-tabs{display:flex;gap:4px}
.tab-btn{font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid #E2E8F0;background:#fff;color:#64748B;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn.active{background:#F0FDF9;color:#0D9488;border-color:#99E6D8}
.view-tabs{border:1px solid #E2E8F0;border-radius:8px;overflow:hidden;gap:0}
.view-tabs .tab-btn{border:none;border-radius:0;border-right:1px solid #E2E8F0}
.view-tabs .tab-btn:last-child{border-right:none}
.view-tabs .tab-btn.active{background:#F1F5F9;color:#1E293B}

/* ── Map color switcher ── */
.map-switcher{display:flex;gap:6px;padding:10px 20px;background:#fff;border-bottom:1px solid #E2E8F0;align-items:center}
.map-switcher label{font-size:12px;color:#64748B;font-weight:500;margin-right:4px}
.msw-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid #E2E8F0;background:#fff;color:#64748B;cursor:pointer;transition:all .15s}
.msw-btn.active{font-weight:500}
.msw-btn[data-mode="gap"].active{background:#FFF7F7;color:#993C1D;border-color:#F5C4B3}
.msw-btn[data-mode="real"].active{background:#EFF6FF;color:#185FA5;border-color:#B5D4F4}
.msw-btn[data-mode="perceived"].active{background:#FFFBEB;color:#854F0B;border-color:#FAC775}

/* ── Main layout ── */
.main{display:grid;grid-template-columns:1fr 360px;height:calc(100vh - 110px)}
.map-container{position:relative}
#map{width:100%;height:100%}

/* ── Sidebar ── */
.sidebar{background:#fff;border-left:1px solid #E2E8F0;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:12px 16px;border-bottom:1px solid #E2E8F0;flex-shrink:0}
.sidebar-count{font-size:12px;color:#64748B}
.card-list{flex:1;overflow-y:auto;padding:10px}
.card-list.hidden{display:none}

/* ── Neighborhood card ── */
.ca-card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:12px 14px;cursor:pointer;margin-bottom:8px;transition:border-color .15s}
.ca-card:hover{border-color:#CBD5E1}
.ca-card.selected{border:1.5px solid #0D9488}
.ca-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ca-name{font-size:13px;font-weight:500;color:#1E293B;text-transform:capitalize}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.tag-over{background:#FAECE7;color:#993C1D}
.tag-under{background:#E6F1FB;color:#185FA5}
.tag-bal{background:#F1EFE8;color:#5F5E5A}
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.bar-label{font-size:11px;color:#94A3B8;width:58px;flex-shrink:0}
.bar-track{flex:1;height:5px;background:#F1F5F9;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.bar-num{font-size:11px;color:#94A3B8;width:28px;text-align:right}

/* ── Detail panel ── */
.detail-panel{background:#fff;border-top:1px solid #E2E8F0;flex-shrink:0;max-height:55%;overflow-y:auto;display:none}
.detail-panel.open{display:block}
.dp-inner{padding:16px}
.dp-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.dp-name{font-size:17px;font-weight:600;color:#1E293B;text-transform:capitalize}
.dp-close{background:none;border:1px solid #E2E8F0;border-radius:8px;width:28px;height:28px;cursor:pointer;color:#94A3B8;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.score-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.score-card{background:#F8FAFC;border-radius:8px;padding:10px;text-align:center}
.sc-lbl{font-size:10px;color:#94A3B8;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.sc-val{font-size:20px;font-weight:600;color:#1E293B}
.verdict{background:#F8FAFC;border-radius:8px;padding:10px 12px;font-size:12px;color:#64748B;line-height:1.65;margin-bottom:12px}
.detail-rows{border-top:1px solid #F1F5F9;padding-top:10px;margin-bottom:12px}
.dr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #F8FAFC;font-size:13px}
.dr:last-child{border-bottom:none}
.dr-lbl{color:#64748B;display:flex;align-items:center;gap:6px}
.dr-val{font-weight:500;color:#1E293B}
.cmp-section{background:#F8FAFC;border-radius:8px;padding:10px 12px}
.cmp-title{font-size:12px;color:#64748B;margin-bottom:8px;font-weight:500}
.cmp-select{width:100%;padding:7px 10px;border:1px solid #E2E8F0;border-radius:8px;font-size:12px;background:#fff;color:#1E293B;outline:none}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.cmp-col{background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:10px}
.cmp-col-name{font-size:12px;font-weight:500;color:#1E293B;margin-bottom:8px;text-transform:capitalize;border-bottom:1px solid #F1F5F9;padding-bottom:6px}
.cmp-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;color:#64748B}
.cmp-row span:last-child{font-weight:500;color:#1E293B}

/* ── Map popup ── */
.leaflet-popup-content-wrapper{border-radius:12px!important;box-shadow:0 4px 20px rgba(0,0,0,0.12)!important;border:1px solid #E2E8F0!important;padding:0!important}
.leaflet-popup-content{margin:0!important;width:200px!important}
.popup-inner{padding:14px}
.popup-name{font-size:14px;font-weight:600;color:#1E293B;margin-bottom:4px;text-transform:capitalize}
.popup-rows{margin:8px 0}
.popup-row{display:flex;justify-content:space-between;font-size:12px;color:#64748B;padding:2px 0}
.popup-row span:last-child{font-weight:500;color:#1E293B}
.popup-btn{width:100%;padding:7px;font-size:12px;border:1px solid #E2E8F0;border-radius:8px;background:#F8FAFC;color:#1E293B;cursor:pointer;margin-top:8px}
.popup-btn:hover{background:#F1F5F9}

/* ── Legend ── */
.map-legend{position:absolute;bottom:24px;left:12px;z-index:1000;background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:10px 14px;font-size:12px}
.leg-title{color:#64748B;font-weight:500;margin-bottom:6px}
.leg-row{display:flex;align-items:center;gap:7px;color:#64748B;margin-bottom:4px}
.leg-row:last-child{margin-bottom:0}
.leg-swatch{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.leg-gradient{width:100px;height:10px;border-radius:5px;margin-top:4px;margin-bottom:2px}
.leg-ends{display:flex;justify-content:space-between;font-size:11px;color:#94A3B8}

/* ── No results ── */
.no-results{text-align:center;padding:40px 20px;color:#94A3B8;font-size:13px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#E2E8F0;border-radius:2px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">Chicago <span>Neighborhood</span> Explorer</div>
  <div class="search-wrap">
    <i>🔍</i>
    <input class="search" id="searchBox" placeholder="Search neighborhood..." oninput="filterCards()">
  </div>
  <div class="role-tabs" id="roleTabs">
    <button class="tab-btn active" data-role="all" onclick="setRole('all')">All info</button>
    <button class="tab-btn" data-role="resident" onclick="setRole('resident')">🏠 Resident</button>
    <button class="tab-btn" data-role="investor" onclick="setRole('investor')">💼 Investor</button>
  </div>
  <div class="view-tabs" id="viewTabs">
    <button class="tab-btn active" data-view="map" onclick="setView('map')">🗺 Map</button>
    <button class="tab-btn" data-view="cards" onclick="setView('cards')">⊞ Cards</button>
  </div>
</div>

<!-- MAP COLOR SWITCHER -->
<div class="map-switcher" id="mapSwitcher">
  <label>Color by:</label>
  <button class="msw-btn active" data-mode="gap" onclick="setColorMode('gap')">Gap (Perceived − Real)</button>
  <button class="msw-btn" data-mode="real" onclick="setColorMode('real')">Real Score</button>
  <button class="msw-btn" data-mode="perceived" onclick="setColorMode('perceived')">Perceived Score</button>
</div>

<!-- MAIN -->
<div class="main" id="mainLayout">
  <div class="map-container" id="mapContainer">
    <div id="map"></div>
    <div class="map-legend" id="mapLegend"></div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-count" id="sidebarCount">76 neighborhoods</div>
    </div>
    <div class="card-list" id="cardList"></div>
    <div class="detail-panel" id="detailPanel">
      <div class="dp-inner">
        <div class="dp-top">
          <div>
            <div class="dp-name" id="dpName"></div>
            <span class="tag" id="dpTag"></span>
          </div>
          <button class="dp-close" onclick="closeDetail()">✕</button>
        </div>
        <div class="score-grid">
          <div class="score-card"><div class="sc-lbl">Real Score</div><div class="sc-val" id="dpReal"></div></div>
          <div class="score-card"><div class="sc-lbl">Perceived</div><div class="sc-val" id="dpPerc"></div></div>
          <div class="score-card"><div class="sc-lbl">Gap</div><div class="sc-val" id="dpGap"></div></div>
        </div>
        <div class="verdict" id="dpVerdict"></div>
        <div class="detail-rows" id="dpRows"></div>
        <div class="cmp-section">
          <div class="cmp-title">Compare with another neighborhood</div>
          <select class="cmp-select" id="cmpSelect" onchange="runCompare()">
            <option value="">— select to compare —</option>
          </select>
          <div id="cmpGrid"></div>
        </div>
      </div>
    </div>
  </div>
</div>

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let currentRole = 'all';
let currentView = 'map';
let currentColorMode = 'gap';
let selectedCA = null;
let map, markers = {};
let filtered = [...DATA];

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════
function fmt(v){ return v.toFixed(2); }
function fmtDollar(v){ return '$' + Math.round(v).toLocaleString(); }
function fmtPct(v){ return Math.round(v*100) + '%'; }

function tagInfo(gap){
  if(gap > 0.15) return {cls:'tag-over', label:'Overperceived'};
  if(gap < -0.05) return {cls:'tag-under', label:'Underperceived'};
  return {cls:'tag-bal', label:'Balanced'};
}

function verdictText(d){
  const name = d.n.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
  if(d.gap > 0.15) return `${name} feels more expensive than its economic data suggests. Environmental signals — dining quality, safety, and commercial activity — create a premium impression that outpaces income and home value indicators.`;
  if(d.gap < -0.05) return `${name} is more economically expensive than it appears. High property values or income levels have not yet translated into the kind of visible amenities that drive perceived expensiveness.`;
  return `${name} is well-calibrated. Its perceived image closely matches its actual economic conditions, suggesting a stable alignment between environment and market.`;
}

function roleFields(d){
  const all = [
    {icon:'🏠', label:'Est. median income', val: fmtDollar(d.income)},
    {icon:'🏢', label:'Avg home value', val: fmtDollar(d.home)},
    {icon:'🛡', label:'Safety score', val: fmtPct(d.crime)},
    {icon:'🍽', label:'Dining quality (Yelp)', val: fmtPct(d.yelp)},
    {icon:'💼', label:'Business score', val: fmtPct(d.biz)},
  ];
  if(currentRole==='resident') return [all[0],all[1],all[2]];
  if(currentRole==='investor') return [all[0],all[1],all[4],
    {icon:'📊', label:'Opportunity gap', val: (d.gap>=0?'+':'')+fmt(d.gap)}];
  return all;
}

// ══════════════════════════════════════════════════════════
// COLOR SCALES
// ══════════════════════════════════════════════════════════
function interpolate(c1,c2,t){
  const h=(hex)=>parseInt(hex,16);
  const r1=h(c1.slice(0,2)),g1=h(c1.slice(2,4)),b1=h(c1.slice(4,6));
  const r2=h(c2.slice(0,2)),g2=h(c2.slice(2,4)),b2=h(c2.slice(4,6));
  const r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),b=Math.round(b1+(b2-b1)*t);
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function getColor(d){
  if(currentColorMode==='gap'){
    const g=d.gap;
    if(g<-0.05) return interpolate('185FA5','93C5FD',Math.max(0,Math.min(1,(g+0.25)/0.25)));
    if(g>0.15)  return interpolate('FCA08A','993C1D',Math.max(0,Math.min(1,(g-0.15)/0.4)));
    return '#CBD5E1';
  }
  if(currentColorMode==='real'){
    const t=Math.max(0,Math.min(1,d.real/0.7));
    return interpolate('DBEAFE','185FA5',t);
  }
  const t=Math.max(0,Math.min(1,d.perc/0.85));
  return interpolate('FEF3C7','854F0B',t);
}

// ══════════════════════════════════════════════════════════
// MAP
// ══════════════════════════════════════════════════════════
function initMap(){
  map = L.map('map',{center:[41.85,-87.68],zoom:11,zoomControl:true});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19
  }).addTo(map);

  DATA.forEach(d=>{
    const marker = L.circleMarker([d.lat,d.lng],{
      radius:10, fillColor:getColor(d), color:'#fff',
      weight:1.5, opacity:1, fillOpacity:0.85
    }).addTo(map);

    marker.on('click',()=>openDetail(d));
    marker.bindPopup(makePopupHTML(d),{maxWidth:220});
    markers[d.n]=marker;
  });

  updateLegend();
}

function makePopupHTML(d){
  const t=tagInfo(d.gap);
  const name=d.n.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
  return `<div class="popup-inner">
    <div class="popup-name">${name}</div>
    <span class="tag ${t.cls}">${t.label}</span>
    <div class="popup-rows">
      <div class="popup-row"><span>Real score</span><span>${fmt(d.real)}</span></div>
      <div class="popup-row"><span>Perceived</span><span>${fmt(d.perc)}</span></div>
      <div class="popup-row"><span>Gap</span><span style="color:${d.gap>0.1?'#D85A30':d.gap<-0.05?'#378ADD':'#888'}">${(d.gap>=0?'+':'')+fmt(d.gap)}</span></div>
    </div>
    <button class="popup-btn" onclick="openDetailByName('${d.n}')">View full details →</button>
  </div>`;
}

function updateMarkerColors(){
  DATA.forEach(d=>{
    if(markers[d.n]){
      markers[d.n].setStyle({fillColor:getColor(d)});
    }
  });
  updateLegend();
}

function updateLegend(){
  const el=document.getElementById('mapLegend');
  if(currentColorMode==='gap'){
    el.innerHTML=`<div class="leg-title">Gap score</div>
      <div class="leg-row"><div class="leg-swatch" style="background:#185FA5"></div>Underperceived (Real > Perceived)</div>
      <div class="leg-row"><div class="leg-swatch" style="background:#CBD5E1"></div>Balanced</div>
      <div class="leg-row"><div class="leg-swatch" style="background:#993C1D"></div>Overperceived (Perceived > Real)</div>`;
  } else if(currentColorMode==='real'){
    el.innerHTML=`<div class="leg-title">Real score</div>
      <div class="leg-gradient" style="background:linear-gradient(to right,#DBEAFE,#185FA5)"></div>
      <div class="leg-ends"><span>Low</span><span>High</span></div>`;
  } else {
    el.innerHTML=`<div class="leg-title">Perceived score</div>
      <div class="leg-gradient" style="background:linear-gradient(to right,#FEF3C7,#854F0B)"></div>
      <div class="leg-ends"><span>Low</span><span>High</span></div>`;
  }
}

// ══════════════════════════════════════════════════════════
// CARDS
// ══════════════════════════════════════════════════════════
function renderCards(){
  const list=document.getElementById('cardList');
  document.getElementById('sidebarCount').textContent=`${filtered.length} neighborhoods`;
  if(filtered.length===0){
    list.innerHTML='<div class="no-results">No neighborhoods found</div>';
    return;
  }
  list.innerHTML=filtered.map(d=>{
    const t=tagInfo(d.gap);
    const name=d.n.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
    const sel=selectedCA&&selectedCA.n===d.n?' selected':'';
    return `<div class="ca-card${sel}" onclick="openDetailByName('${d.n}')">
      <div class="ca-header">
        <span class="ca-name">${name}</span>
        <span class="tag ${t.cls}">${t.label}</span>
      </div>
      <div class="bar-row"><span class="bar-label">Real</span>
        <div class="bar-track"><div class="bar-fill" style="width:${d.real*100}%;background:#378ADD"></div></div>
        <span class="bar-num">${fmt(d.real)}</span></div>
      <div class="bar-row"><span class="bar-label">Perceived</span>
        <div class="bar-track"><div class="bar-fill" style="width:${d.perc*100}%;background:#D85A30"></div></div>
        <span class="bar-num">${fmt(d.perc)}</span></div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════
// DETAIL PANEL
// ══════════════════════════════════════════════════════════
function openDetailByName(name){
  const d=DATA.find(x=>x.n===name);
  if(d) openDetail(d);
}

function openDetail(d){
  selectedCA=d;
  const t=tagInfo(d.gap);
  const name=d.n.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());

  document.getElementById('dpName').textContent=name;
  const tagEl=document.getElementById('dpTag');
  tagEl.className='tag '+t.cls;
  tagEl.textContent=t.label;

  document.getElementById('dpReal').textContent=fmt(d.real);
  document.getElementById('dpPerc').textContent=fmt(d.perc);
  const gapEl=document.getElementById('dpGap');
  gapEl.textContent=(d.gap>=0?'+':'')+fmt(d.gap);
  gapEl.style.color=d.gap>0.1?'#D85A30':d.gap<-0.05?'#378ADD':'#1E293B';

  document.getElementById('dpVerdict').textContent=verdictText(d);

  const fields=roleFields(d);
  document.getElementById('dpRows').innerHTML=fields.map(f=>
    `<div class="dr"><span class="dr-lbl">${f.icon} ${f.label}</span><span class="dr-val">${f.val}</span></div>`
  ).join('');

  const sel=document.getElementById('cmpSelect');
  sel.innerHTML='<option value="">— select to compare —</option>'+
    DATA.filter(x=>x.n!==d.n).map(x=>{
      const nm=x.n.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
      return `<option value="${x.n}">${nm}</option>`;
    }).join('');
  document.getElementById('cmpGrid').innerHTML='';

  document.getElementById('detailPanel').classList.add('open');
  renderCards();

  // pan map to selected
  if(map && currentView==='map'){
    map.panTo([d.lat,d.lng],{animate:true});
    if(markers[d.n]) markers[d.n].openPopup();
  }
}

function closeDetail(){
  selectedCA=null;
  document.getElementById('detailPanel').classList.remove('open');
  renderCards();
}

function runCompare(){
  if(!selectedCA) return;
  const val=document.getElementById('cmpSelect').value;
  if(!val) return;
  const b=DATA.find(x=>x.n===val);
  const a=selectedCA;
  const nameA=a.n.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
  const nameB=b.n.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
  const fields=[
    {label:'Real score',fa:fmt(a.real),fb:fmt(b.real)},
    {label:'Perceived',fa:fmt(a.perc),fb:fmt(b.perc)},
    {label:'Gap',fa:(a.gap>=0?'+':'')+fmt(a.gap),fb:(b.gap>=0?'+':'')+fmt(b.gap)},
    {label:'Income',fa:fmtDollar(a.income),fb:fmtDollar(b.income)},
    {label:'Home value',fa:fmtDollar(a.home),fb:fmtDollar(b.home)},
    {label:'Safety',fa:fmtPct(a.crime),fb:fmtPct(b.crime)},
    {label:'Dining',fa:fmtPct(a.yelp),fb:fmtPct(b.yelp)},
  ];
  document.getElementById('cmpGrid').innerHTML=`<div class="cmp-grid">
    <div class="cmp-col"><div class="cmp-col-name">${nameA}</div>
      ${fields.map(f=>`<div class="cmp-row"><span>${f.label}</span><span>${f.fa}</span></div>`).join('')}
    </div>
    <div class="cmp-col"><div class="cmp-col-name">${nameB}</div>
      ${fields.map(f=>`<div class="cmp-row"><span>${f.label}</span><span>${f.fb}</span></div>`).join('')}
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════════════════════
function setRole(r){
  currentRole=r;
  document.querySelectorAll('#roleTabs .tab-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.role===r);
  });
  if(selectedCA) openDetail(selectedCA);
}

function setView(v){
  currentView=v;
  document.querySelectorAll('#viewTabs .tab-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.view===v);
  });
  const mapContainer=document.getElementById('mapContainer');
  const mapSwitcher=document.getElementById('mapSwitcher');
  if(v==='map'){
    mapContainer.style.display='block';
    mapSwitcher.style.display='flex';
    setTimeout(()=>map&&map.invalidateSize(),100);
  } else {
    mapContainer.style.display='none';
    mapSwitcher.style.display='none';
    document.getElementById('mainLayout').style.gridTemplateColumns='1fr 360px';
  }
}

function setColorMode(m){
  currentColorMode=m;
  document.querySelectorAll('.msw-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.mode===m);
  });
  updateMarkerColors();
}

function filterCards(){
  const q=document.getElementById('searchBox').value.toLowerCase().trim();
  filtered=q?DATA.filter(d=>d.n.toLowerCase().includes(q)):[...DATA];
  renderCards();
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
window.addEventListener('load',()=>{
  initMap();
  renderCards();
});
</script>
